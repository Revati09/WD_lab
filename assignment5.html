<!DOCTYPE html>
<html>
<head>
    <title>Image Webpage</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff758c, #ff7eb3);
            text-align: center;
            color: white;
        }

        .container {
            padding: 40px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .image-box {
            background: white;
            padding: 20px;
            border-radius: 15px;
            display: inline-block;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        img {
            width: 300px;
            height: 200px;
            border-radius: 10px;
            transition: transform 0.4s;
        }

        img:hover {
            transform: scale(1.1);
        }

        p {
            color: #333;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>My Image Gallery</h1>

        <div class="image-box">
            <img src="https://picsum.photos/300/200" alt="Sample Image">
            <p>Beautiful Random Image</p>
        </div>
    </div>

</body>
</html>
